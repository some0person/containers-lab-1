version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: myapp_test
    networks:
      - test-network

  app:
    image: ${APP_IMAGE}
    environment:
      DB_HOST: postgres
      DB_PASSWORD: secret
      DB_NAME: myapp_test
    depends_on:
      postgres:
        condition: service_started
    networks:
      - test-network

  nginx:
    image: ${NGINX_IMAGE}
    ports:
      - "80:80"
    depends_on:
      app:
        condition: service_started
    networks:
      - test-network

networks:
  test-network:
    driver: bridge