version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: lab1-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: myapp
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: lab1-app
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: secret
      DB_NAME: myapp
      PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      # Приложение отдает health по /api/health
      test: ["CMD", "wget", "--spider", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: lab1-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/index.html:/usr/share/nginx/html/index.html:ro
    ports:
      # Ожидание со стороны пользователя: открыть интерфейс на localhost:8080
      - "8080:80"
    depends_on:
      app:
        condition: service_healthy
    networks:
      - app-network

volumes:
  postgres_data:
    name: lab1-postgres-data

networks:
  app-network:
    name: lab1-network
    driver: bridge
