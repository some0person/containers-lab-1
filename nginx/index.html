<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Containerization Demo</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            color: #333;
        }
        h1 {
            color: #667eea;
            margin-top: 0;
        }
        form {
            margin: 20px 0;
            display: flex;
            gap: 10px;
        }
        input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }
        button:hover {
            background: #764ba2;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: #667eea;
            color: white;
        }
        .badge {
            display: inline-block;
            padding: 5px 10px;
            background: #4CAF50;
            color: white;
            border-radius: 3px;
            font-size: 12px;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐳 Docker Multi-Container Application</h1>
        <p>Это приложение демонстрирует работу с Docker контейнерами:
            <span class="badge">Go Backend</span>
            <span class="badge">PostgreSQL</span>
            <span class="badge">Nginx</span>
        </p>
        <h2>Добавить пользователя</h2>
        <form id="userForm">
            <input type="text" id="userName" placeholder="Введите имя" required>
            <button type="submit">Добавить</button>
        </form>
        <h2>Список пользователей</h2>
        <table id="usersTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Имя</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody id="usersList"></tbody>
        </table>
        <div style="margin-top: 20px; padding: 10px; background: #f5f5f5; border-radius: 5px;">
            <strong>Информация о контейнере:</strong>
            <pre id="containerInfo" style="margin: 10px 0 0; font-size: 12px;"></pre>
        </div>
    </div>
    <script>
        async function loadUsers() {
            const response = await fetch('/api/users');
            const users = await response.json();
            const tbody = document.getElementById('usersList');
            tbody.innerHTML = '';
            users.forEach(user => {
                const row = tbody.insertRow();
                row.insertCell(0).textContent = user.id;
                row.insertCell(1).textContent = user.name;
                const deleteCell = row.insertCell(2);
                const deleteBtn = document.createElement('button');
                deleteBtn.textContent = 'Удалить';
                deleteBtn.style.background = '#f44336';
                deleteBtn.onclick = () => deleteUser(user.id);
                deleteCell.appendChild(deleteBtn);
            });
        }

        document.getElementById('userForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('userName').value;
            const formData = new FormData();
            formData.append('name', name);
            await fetch('/api/users/add', {
                method: 'POST',
                body: formData
            });
            document.getElementById('userName').value = '';
            loadUsers();
        });

        async function deleteUser(id) {
            if (confirm('Удалить пользователя?')) {
                await fetch(`/api/users/${id}`, { method: 'DELETE' });
                loadUsers();
            }
        }

        async function getContainerInfo() {
            const response = await fetch('/api/health');
            const data = await response.json();
            document.getElementById('containerInfo').textContent =
                `Статус: ${data.status}\nХост: ${window.location.hostname}\nВремя: ${new Date().toLocaleString()}`;
        }

        loadUsers();
        getContainerInfo();
        setInterval(getContainerInfo, 5000);
    </script>
</body>
</html>
